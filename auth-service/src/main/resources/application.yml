server:
  port: 8081

spring:
  application:
    name: auth-service
  config:
    import: "optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}"
  cloud:
    compatibility-verifier:
      enabled: false
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/enterpriseshop}
    username: ${DB_USERNAME:shop_user}
    password: ${DB_PASSWORD:shop_password}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

# JWT configuration
jwt:
  # Base64-encoded 256-bit secret (change in production!)
  secret: ${JWT_SECRET:dGhpcy1pcy1hLXZlcnktbG9uZy1zZWNyZXQta2V5LWZvci1qd3QtdG9rZW5z}
  access-expiration-ms: 900000      # 15 minutes
  refresh-expiration-ms: 604800000  # 7 days

eureka:
  client:
    enabled: ${EUREKA_ENABLED:false}
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

logging:
  level:
    root: INFO
    com.example.authservice: DEBUG

